<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>心情记录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 520px;
            margin: 80px auto;
            padding: 40px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .prompt {
            font-size: 20px;
            color: #333;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0056b3;
        }
        .link-record {
            display: block;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }
        .link-record:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="prompt">今天有什么事想记录嘛？</p>
        <a th:href="@{/mood}" class="btn">去记录</a>
        <a th:href="@{/mood/list}" class="link-record">查看记录</a>
    </div>
</body>
</html>
