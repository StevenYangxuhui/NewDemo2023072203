<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>保健品风险自查 · CancerApp</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; }
        .container { max-width: 640px; margin: 0 auto; }
        .warn { background: #fff7ed; border: 1px solid #fdba74; border-radius: 12px; padding: 12px 14px; font-size: 14px; color: #9a3412; line-height: 1.55; margin-bottom: 14px; }
        .title { font-size: 20px; font-weight: 600; color: #111827; margin-bottom: 12px; }
        .search { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .search input { flex: 1; min-width: 200px; padding: 12px 14px; border-radius: 12px; border: 1px solid #d1d5db; font-size: 15px; box-sizing: border-box; }
        .search button { padding: 12px 20px; border-radius: 999px; border: none; background: linear-gradient(135deg,#2563eb,#4f46e5); color: #fff; font-weight: 600; cursor: pointer; }
        .section-title { font-size: 16px; font-weight: 700; color: #111827; margin: 18px 0 10px; }
        .card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid #e5e7eb; }
        .card.avoid { border-left: 4px solid #dc2626; }
        .card.caution { border-left: 4px solid #d97706; }
        .card.safe { border-left: 4px solid #059669; }
        .name { font-weight: 700; font-size: 15px; color: #111827; }
        .risk { font-size: 12px; font-weight: 700; margin-top: 6px; }
        .risk.avoid { color: #b91c1c; }
        .risk.caution { color: #b45309; }
        .risk.safe { color: #047857; }
        .txt { font-size: 14px; color: #4b5563; line-height: 1.5; margin-top: 8px; }
        .tags { font-size: 12px; color: #6b7280; margin-top: 6px; }
        .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .chip { font-size: 12px; padding: 4px 10px; background: #f3f4f6; border-radius: 999px; color: #374151; }
        .empty { text-align: center; padding: 20px; color: #6b7280; font-size: 14px; }
        .footer { margin-top: 20px; text-align: center; }
        .footer a { color: #2563eb; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="warn">
        以下为<strong>参考提示</strong>，根据内置常见条目与<strong>您已添加的化疗方案参考药名</strong>做简单匹配，<strong>不能代替医生或药师</strong>。吃新药、新保健品前务必问清楚。
    </div>
    <div class="title">保健品风险自查</div>
    <p style="font-size:14px;color:#4b5563;margin:-4px 0 12px;line-height:1.5;">
        匹配结果按<strong>禁用（红）/ 慎用（黄）/ 可用（绿）</strong>提示；具体能否服用须以主治医生、药师为准。
    </p>
    <form class="search" th:action="@{/supplement-check}" method="get">
        <input type="search" name="q" th:value="${q}" placeholder="输入保健品名，如：维生素C、鱼油、灵芝…">
        <button type="submit">查一查</button>
    </form>

    <div th:if="${q != null and !q.isBlank() and (nameHits == null or nameHits.isEmpty())}" class="empty">
        库里暂时没有完全匹配「<span th:text="${q}"></span>」的条目，可换个说法试试，或问药师。
    </div>
    <div th:if="${q != null and !q.isBlank() and nameHits != null and !nameHits.isEmpty()}">
        <div class="section-title">与「<span th:text="${q}"></span>」相关的条目</div>
        <div th:each="r : ${nameHits}" class="card" th:classappend="${r.riskLevel == 'AVOID'} ? ' avoid' : (${r.riskLevel == 'CAUTION'} ? ' caution' : ' safe')">
            <div class="name" th:text="${r.supplementName}">名</div>
            <div class="risk" th:classappend="${r.riskLevel == 'AVOID'} ? ' avoid' : (${r.riskLevel == 'CAUTION'} ? ' caution' : ' safe')"
                 th:text="${r.riskLevel == 'AVOID'} ? '建议：避免自行使用' : (${r.riskLevel == 'CAUTION'} ? '建议：慎用，先问医生' : '多数情况下相对可接受，仍建议告知医生')">等级</div>
            <div class="txt" th:if="${r.reason != null}" th:text="${r.reason}"></div>
            <div class="txt" th:if="${r.suggestion != null}"><strong>建议：</strong><span th:text="${r.suggestion}"></span></div>
            <div class="tags" th:if="${r.ingredientTags != null}">关键词：<span th:text="${r.ingredientTags}"></span></div>
        </div>
    </div>

    <div class="section-title">根据您方案里的参考药名，可能相关的提示</div>
    <div th:if="${myDrugs == null or myDrugs.isEmpty()}" class="empty">您还没在「化疗方案」里添加方案，或方案下没有参考药名。添加后可自动匹配这部分内容。</div>
    <div th:if="${myDrugs != null and !myDrugs.isEmpty()}" class="chips">
        <span class="chip" th:each="d : ${myDrugs}" th:text="${d}">药</span>
    </div>
    <div th:if="${drugRelated == null or drugRelated.isEmpty()}" class="empty" style="margin-top:8px;">暂无与这些药名自动匹配的规则（或规则库未覆盖）。</div>
    <div th:each="r : ${drugRelated}" class="card" th:classappend="${r.riskLevel == 'AVOID'} ? ' avoid' : (${r.riskLevel == 'CAUTION'} ? ' caution' : ' safe')">
        <div class="name" th:text="${r.supplementName}">名</div>
        <div class="risk" th:classappend="${r.riskLevel == 'AVOID'} ? ' avoid' : (${r.riskLevel == 'CAUTION'} ? ' caution' : ' safe')"
             th:text="${r.riskLevel == 'AVOID'} ? '禁用倾向' : (${r.riskLevel == 'CAUTION'} ? '慎用' : '相对安全')"></div>
        <div class="txt" th:if="${r.reason != null}" th:text="${r.reason}"></div>
        <div class="txt" th:if="${r.suggestion != null}"><strong>建议：</strong><span th:text="${r.suggestion}"></span></div>
    </div>

    <div class="footer"><a th:href="@{/home}">← 功能首页</a> · <a th:href="@{/interaction}">看总览：营养与药</a></div>
</div>
</body>
</html>
