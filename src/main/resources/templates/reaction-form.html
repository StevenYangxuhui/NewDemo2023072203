<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>编辑反应 · CancerApp</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; }
        .container { max-width: 640px; margin: 0 auto; background: #fff; border-radius: 14px; padding: 20px 18px; box-shadow: 0 4px 18px rgba(15,23,42,.12); }
        .title { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #111827; }
        .form-item { margin-bottom: 14px; }
        label { display: block; font-size: 14px; color: #374151; margin-bottom: 6px; }
        input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 15px; }
        textarea { min-height: 80px; resize: vertical; }
        .hint { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
        .btn { padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg,#2563eb,#4f46e5); color: #fff; }
        .btn-ghost { background: #f3f4f6; color: #374151; }
        .flash { padding: 10px; border-radius: 10px; margin-bottom: 12px; background: #fef2f2; color: #991b1b; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="title" th:text="${reaction.id != null} ? '修改记录' : '新增记录'">编辑</div>
    <p th:if="${error}" class="flash" th:text="${error}"></p>
    <form th:action="@{/reaction/save}" method="post">
        <input type="hidden" name="id" th:value="${reaction.id}" th:if="${reaction.id != null}">
        <div class="form-item">
            <label for="recordDate">哪一天 *</label>
            <input id="recordDate" type="date" name="recordDate" required
                   th:value="${reaction.recordDate != null} ? ${#temporals.format(reaction.recordDate, 'yyyy-MM-dd')} : ''">
        </div>
        <div class="form-item">
            <label for="reactionType">哪种不舒服 *</label>
            <select id="reactionType" name="reactionType" required>
                <option th:each="t : ${reactionTypes}" th:value="${t}" th:text="${t}"
                        th:selected="${reaction.reactionType != null and reaction.reactionType == t}"></option>
            </select>
        </div>
        <div class="form-item">
            <label for="severity">有多难受？1 最轻 — 5 最重（可空）</label>
            <input id="severity" type="number" name="severity" min="1" max="5" th:value="${reaction.severity}">
        </div>
        <div class="form-item">
            <label for="regimenId">和哪次化疗方案相关（可空）</label>
            <select id="regimenId" name="regimenId">
                <option value="">不确定 / 不关联</option>
                <option th:each="g : ${regimens}" th:value="${g.id}" th:text="${g.regimenName}"
                        th:selected="${reaction.regimenId != null and reaction.regimenId == g.id}"></option>
            </select>
            <p class="hint">若已在「化疗方案」里添加过方案，可在这里选一下，方便以后对照。</p>
        </div>
        <div class="form-item">
            <label for="detail">还想记点什么（可选）</label>
            <textarea id="detail" name="detail" th:text="${reaction.detail != null ? reaction.detail : ''}"></textarea>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a th:href="@{/reaction}" class="btn btn-ghost">返回</a>
        </div>
    </form>
</div>
</body>
</html>
