<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title th:text="${med.id != null} ? '编辑用药' : '添加用药'">用药</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; box-sizing: border-box; }
        .container { max-width: 640px; margin: 0 auto; background: #fff; border-radius: 14px; padding: 20px 18px; box-shadow: 0 4px 18px rgba(15,23,42,.12); }
        .title { font-size: 20px; font-weight: 600; color: #111827; margin-bottom: 4px; }
        .sub { font-size: 13px; color: #6b7280; margin-bottom: 18px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px 16px; }
        .form-item { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 13px; color: #4b5563; }
        input, textarea { padding: 8px 10px; border-radius: 9px; border: 1px solid #d1d5db; font-size: 14px; box-sizing: border-box; }
        textarea { min-height: 64px; resize: vertical; }
        input:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
        .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #4f46e5); color: #fff; }
        .btn-ghost { background: #f3f4f6; color: #374151; }
        .flash { padding: 10px 12px; border-radius: 10px; margin-bottom: 14px; font-size: 14px; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>
<div class="container">
    <div class="title" th:text="${med.id != null} ? '编辑用药' : '添加用药'">用药</div>
    <p class="sub">
        方案：<span th:text="${regimen.regimenName}">—</span>
    </p>
    <p th:if="${error}" class="flash" th:text="${error}"></p>
    <form th:action="@{/regimen/med/save}" method="post">
        <input type="hidden" name="regimenId" th:value="${regimen.id}">
        <input type="hidden" name="id" th:value="${med.id}" th:if="${med.id != null}">
        <div class="form-grid">
            <div class="form-item" style="grid-column: 1 / -1;">
                <label for="drugName">药物名称 *</label>
                <input id="drugName" name="drugName" required th:value="${med.drugName}" placeholder="如 奥沙利铂">
            </div>
            <div class="form-item">
                <label for="dose">剂量</label>
                <input id="dose" name="dose" th:value="${med.dose}" placeholder="如 85mg/m²">
            </div>
            <div class="form-item">
                <label for="route">给药方式</label>
                <input id="route" name="route" th:value="${med.route}" placeholder="静脉 / 口服">
            </div>
            <div class="form-item">
                <label for="frequency">给药频次</label>
                <input id="frequency" name="frequency" th:value="${med.frequency}" placeholder="如 qd、bid">
            </div>
            <div class="form-item">
                <label for="dayInCycle">周期内第几天用药</label>
                <input id="dayInCycle" type="number" name="dayInCycle" min="0" th:value="${med.dayInCycle}">
            </div>
            <div class="form-item" style="grid-column: 1 / -1;">
                <label for="remark">其他说明</label>
                <textarea id="remark" name="remark" th:text="${med.remark != null ? med.remark : ''}"></textarea>
            </div>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a th:href="@{/regimen/meds(regimenId=${regimen.id})}" class="btn btn-ghost">取消</a>
        </div>
    </form>
</div>
</body>
</html>
