<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>每日营养方案 · CancerApp</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; }
        .container { max-width: 640px; margin: 0 auto; }
        .intro { font-size: 14px; color: #4b5563; line-height: 1.55; background: #fff; padding: 12px 14px; border-radius: 12px; border: 1px solid #e5e7eb; margin-bottom: 14px; }
        .head-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
        .title { font-size: 20px; font-weight: 600; color: #111827; }
        .btn { display: inline-block; padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 600; text-decoration: none; background: linear-gradient(135deg,#2563eb,#4f46e5); color: #fff; }
        .flash { padding: 10px 12px; border-radius: 10px; margin-bottom: 12px; font-size: 14px; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .card { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 10px; border: 1px solid #e5e7eb; box-shadow: 0 2px 8px rgba(15,23,42,.06); }
        .date-line { font-size: 15px; font-weight: 700; color: #111827; }
        .phase { display: inline-block; font-size: 12px; padding: 2px 10px; border-radius: 999px; background: #eef2ff; color: #4338ca; margin-top: 6px; }
        .body { font-size: 14px; color: #4b5563; line-height: 1.55; margin-top: 10px; }
        .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 999px; text-decoration: none; border: none; cursor: pointer; }
        .empty { text-align: center; padding: 28px; color: #6b7280; background: #fff; border-radius: 14px; border: 1px dashed #e5e7eb; }
        .footer { margin-top: 18px; text-align: center; }
        .footer a { color: #2563eb; font-size: 14px; text-decoration: none; }
        .phase-grid { display: grid; gap: 10px; margin-bottom: 14px; }
        .phase-card { background: #fff; border-radius: 12px; padding: 12px 14px; border: 1px solid #e5e7eb; font-size: 13px; line-height: 1.5; color: #374151; }
        .phase-card h4 { margin: 0 0 8px; font-size: 14px; color: #111827; }
        .react-hint { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 12px 14px; font-size: 14px; color: #1e3a5f; margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="container">
    <p class="intro">按<strong>化疗前 / 中 / 后</strong>准备饮食：高蛋白、高热量、易消化；若您记录了<strong>恶心、腹泻、口腔溃疡</strong>等反应，保存反应后会<strong>自动合并到当日营养记录</strong>作参考（可再手动修改）。</p>

    <div class="react-hint" th:if="${latestReaction != null}">
        <strong>最近一条反应：</strong>
        <span th:text="${#temporals.format(latestReaction.recordDate, 'yyyy-MM-dd')}"></span>
        · <span th:text="${latestReaction.reactionType}"></span>
        <span th:if="${latestReaction.severity != null}" th:text="'（程度 ' + ${latestReaction.severity} + '）'"></span>
        — 已尝试据此调整当日营养建议，请在下文记录中查看。
    </div>

    <div class="phase-grid" th:if="${phaseBlocks != null}">
        <div class="phase-card" th:each="b : ${phaseBlocks}">
            <h4 th:text="${b.phaseTitle}">阶段</h4>
            <div th:text="${b.dietText}">原则</div>
            <div style="margin-top:8px;color:#6b7280;font-size:12px;" th:text="${b.menuText}">示例</div>
        </div>
    </div>

    <div class="head-row">
        <div class="title">我的每日记录</div>
        <a th:href="@{/daily-plan/edit}" class="btn">＋ 新增一天</a>
    </div>
    <p th:if="${error}" class="flash" th:text="${error}"></p>
    <div th:if="${plans == null or plans.isEmpty()}" class="empty">还没有记录。可新增一天开始写。</div>
    <div th:each="p : ${plans}" class="card">
        <div class="date-line" th:text="${#temporals.format(p.planDate, 'yyyy-MM-dd')}">日期</div>
        <span class="phase" th:text="${phaseLabels.get(p.phase) != null ? phaseLabels.get(p.phase) : p.phase}">阶段</span>
        <div class="body" th:if="${p.mainIssue != null}"><strong>针对</strong>：<span th:text="${p.mainIssue}">—</span></div>
        <div class="body" th:if="${p.energyKcal != null or p.proteinG != null}">
            参考：热量 <span th:text="${p.energyKcal != null ? p.energyKcal + ' kcal' : '—'}">—</span>
            · 蛋白质约 <span th:text="${p.proteinG != null ? p.proteinG + ' g' : '—'}">—</span>
        </div>
        <div class="body" th:if="${p.dietAdvice != null}" th:text="${p.dietAdvice}">建议</div>
        <div class="body" th:if="${p.sampleMenu != null}"><strong>示例</strong>：<span th:text="${p.sampleMenu}">—</span></div>
        <div class="actions">
            <a class="btn-sm" style="border:1px solid #e5e7eb;background:#fff;" th:href="@{/daily-plan/edit(id=${p.id})}">修改</a>
            <form th:action="@{/daily-plan/delete}" method="post" style="display:inline;" onsubmit="return confirm('删除这条？');">
                <input type="hidden" name="id" th:value="${p.id}">
                <button type="submit" class="btn-sm" style="background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;">删除</button>
            </form>
        </div>
    </div>
    <div class="footer"><a th:href="@{/home}">← 功能首页</a></div>
</div>
</body>
</html>
