<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>更新治疗进度 · CancerApp</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; box-sizing: border-box; }
        .container { max-width: 640px; margin: 0 auto; background: #fff; border-radius: 14px; padding: 20px 18px; box-shadow: 0 4px 18px rgba(15,23,42,.12); }
        .readonly-title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 4px; }
        .readonly-sub { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
        .form-title { font-size: 15px; font-weight: 600; color: #111827; margin-bottom: 12px; }
        .form-item { margin-bottom: 14px; }
        .form-item label { display: block; font-size: 14px; color: #374151; margin-bottom: 6px; }
        .hint-under { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        input, textarea {
            width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 15px;
        }
        textarea { min-height: 64px; }
        .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
        .btn { padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #4f46e5); color: #fff; }
        .btn-ghost { background: #f3f4f6; color: #374151; }
        .flash { padding: 10px 12px; border-radius: 10px; margin-bottom: 12px; font-size: 14px; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>
<div class="container">
    <div class="readonly-title" th:text="${regimenCatalog.resolveListTitle(regimen)}">方案</div>
    <div class="readonly-sub"
         th:text="${regimenCatalog.resolveSubtitle(regimen) != null ? regimenCatalog.resolveSubtitle(regimen) : regimen.regimenName}">副标题</div>

    <p th:if="${error}" class="flash" th:text="${error}"></p>

    <div class="form-title">只改日期和周期，不改药（药单由您选的方案类型自动生成）</div>
    <form th:action="@{/regimen/progress/save}" method="post">
        <input type="hidden" name="regimenId" th:value="${regimen.id}">
        <div class="form-item">
            <label for="startDate">第一次开始化疗的日期</label>
            <input id="startDate" type="date" name="startDate"
                   th:value="${regimen.startDate != null} ? ${#temporals.format(regimen.startDate, 'yyyy-MM-dd')} : ''">
        </div>
        <div class="form-item">
            <label for="totalCycles">计划总周期数</label>
            <input id="totalCycles" type="number" name="totalCycles" min="1" max="99" th:value="${regimen.totalCycles}">
        </div>
        <div class="form-item">
            <label for="currentCycle">当前第几周期</label>
            <input id="currentCycle" type="number" name="currentCycle" min="1" max="99" th:value="${regimen.currentCycle}">
        </div>
        <div class="form-item">
            <label for="currentDay">本周期第几天</label>
            <input id="currentDay" type="number" name="currentDay" min="1" max="99" th:value="${regimen.currentDay}">
            <p class="hint-under">与「今日用药提示」有关，尽量和病历或护士说法一致。</p>
        </div>
        <div class="form-item">
            <label for="note">备注</label>
            <textarea id="note" name="note" th:text="${regimen.note != null ? regimen.note : ''}"></textarea>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a th:href="@{/regimen}" class="btn btn-ghost">返回</a>
        </div>
    </form>
</div>
</body>
</html>
