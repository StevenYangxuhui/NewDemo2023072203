<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>登录 · CancerApp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 380px;
            padding: 32px 24px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 6px 26px rgba(15, 23, 42, 0.16);
            box-sizing: border-box;
        }
        .title {
            font-size: 20px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 18px;
            text-align: center;
        }
        .label {
            display: block;
            font-size: 13px;
            color: #4b5563;
            margin-bottom: 6px;
        }
        .form-item {
            margin-bottom: 18px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            border-radius: 9px;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: #fff;
            border: none;
            font-size: 16px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s, transform 0.08s, box-shadow 0.12s;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.30);
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.36);
        }
        .error {
            color: #b91c1c;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }
        .notice {
            color: #047857;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }
        .dev-footer {
            margin-top: 18px;
            font-size: 11px;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">登录 CancerApp</div>
        <p class="notice" th:if="${notice}" th:text="${notice}"></p>
        <p class="error" th:if="${error}" th:text="${error}"></p>
        <form th:action="@{/login}" method="post">
            <div class="form-item">
                <label class="label" for="name">姓名</label>
                <input type="text" id="name" name="name" placeholder="请输入姓名" autofocus autocomplete="name" />
            </div>
            <div class="form-item">
                <label class="label" for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="暂不校验，仅作示意" autocomplete="current-password" />
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <!-- 作业截图学号标识 dev-72203 Yang SiQing -->
        <p class="dev-footer">开发者标识 · 学号后五位 72203 · Yang SiQing</p>
    </div>
</body>
</html>
