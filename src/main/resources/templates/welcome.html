<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>CancerApp · 化疗营养助手</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 32px 24px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 6px 30px rgba(15, 23, 42, 0.18);
            text-align: center;
        }
        .app-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #111827;
        }
        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
        }
        .btn-primary {
            display: inline-block;
            padding: 12px 32px;
            border-radius: 999px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
            transition: transform 0.08s ease-out, box-shadow 0.12s ease-out, filter 0.12s;
        }
        .btn-primary:hover {
            filter: brightness(1.03);
            transform: translateY(-1px);
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4);
        }
        .hint {
            margin-top: 18px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-name">CancerApp</div>
        <div class="subtitle">化疗中的营养管家 · 帮你把每一天吃好</div>
        <a th:href="@{/login}" class="btn-primary">请登录</a>
        <div class="hint">登录后进入<strong>功能首页</strong>，可查看周期阶段、风险提醒与每日营养入口。</div>
    </div>
</body>
</html>
