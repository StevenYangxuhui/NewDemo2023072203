<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>编辑营养方案 · CancerApp</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; }
        .container { max-width: 640px; margin: 0 auto; background: #fff; border-radius: 14px; padding: 20px 18px; box-shadow: 0 4px 18px rgba(15,23,42,.12); }
        .title { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #111827; }
        .form-item { margin-bottom: 14px; }
        label { display: block; font-size: 14px; color: #374151; margin-bottom: 6px; }
        input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 15px; }
        textarea { min-height: 88px; resize: vertical; }
        .hint { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
        .btn { padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg,#2563eb,#4f46e5); color: #fff; }
        .btn-ghost { background: #f3f4f6; color: #374151; }
        .flash { padding: 10px; border-radius: 10px; margin-bottom: 12px; background: #fef2f2; color: #991b1b; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="title" th:text="${plan.id != null} ? '修改这一天的方案' : '新增一天的方案'">编辑</div>
    <p th:if="${error}" class="flash" th:text="${error}"></p>
    <form th:action="@{/daily-plan/save}" method="post">
        <input type="hidden" name="id" th:value="${plan.id}" th:if="${plan.id != null}">
        <div class="form-item">
            <label for="planDate">日期 *</label>
            <input id="planDate" type="date" name="planDate" required
                   th:value="${plan.planDate != null} ? ${#temporals.format(plan.planDate, 'yyyy-MM-dd')} : ''">
        </div>
        <div class="form-item">
            <label for="phase">阶段 *</label>
            <select id="phase" name="phase" required>
                <option value="PRE" th:selected="${plan.phase == 'PRE'}">化疗前</option>
                <option value="DURING" th:selected="${plan.phase == 'DURING' or plan.phase == null}">化疗中</option>
                <option value="POST" th:selected="${plan.phase == 'POST'}">化疗后</option>
            </select>
        </div>
        <div class="form-item">
            <label for="mainIssue">主要针对（可选，如：恶心、腹泻）</label>
            <input id="mainIssue" name="mainIssue" th:value="${plan.mainIssue}" placeholder="可空">
        </div>
        <div class="form-item">
            <label for="energyKcal">建议热量 kcal（可选）</label>
            <input id="energyKcal" type="number" name="energyKcal" min="0" th:value="${plan.energyKcal}">
        </div>
        <div class="form-item">
            <label for="proteinG">建议蛋白质 g（可选）</label>
            <input id="proteinG" type="number" name="proteinG" min="0" step="0.1" th:value="${plan.proteinG}">
        </div>
        <div class="form-item">
            <label for="regimenId">关联化疗方案（可选）</label>
            <select id="regimenId" name="regimenId">
                <option value="">不关联</option>
                <option th:each="g : ${regimens}" th:value="${g.id}" th:text="${g.regimenName}"
                        th:selected="${plan.regimenId != null and plan.regimenId == g.id}"></option>
            </select>
        </div>
        <div class="form-item">
            <label for="dietAdvice">饮食原则 / 建议（可选）</label>
            <textarea id="dietAdvice" name="dietAdvice" th:text="${plan.dietAdvice != null ? plan.dietAdvice : ''}"></textarea>
        </div>
        <div class="form-item">
            <label for="sampleMenu">示例菜谱（可选）</label>
            <textarea id="sampleMenu" name="sampleMenu" th:text="${plan.sampleMenu != null ? plan.sampleMenu : ''}"></textarea>
            <p class="hint">可以写「早餐粥+蛋」「午晚餐少油」等，怎么顺口怎么写。</p>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a th:href="@{/daily-plan}" class="btn btn-ghost">返回</a>
        </div>
    </form>
</div>
</body>
</html>
