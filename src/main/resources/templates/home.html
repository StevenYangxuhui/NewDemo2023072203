<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>首页 · CancerApp</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; box-sizing: border-box; }
        .container { max-width: 560px; margin: 0 auto; }
        .greeting { font-size: 20px; font-weight: 600; margin: 8px 0 14px; color: #111827; }
        .greeting span { color: #2563eb; }
        .block {
            background: #fff; border-radius: 14px; padding: 14px 14px 16px; margin-bottom: 12px;
            border: 1px solid #e5e7eb; box-shadow: 0 2px 10px rgba(15,23,42,.08);
        }
        .block h2 { font-size: 14px; font-weight: 700; color: #6b7280; margin: 0 0 8px; text-transform: none; letter-spacing: 0; }
        .block p { font-size: 15px; color: #111827; line-height: 1.55; margin: 0; }
        .card-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .mini { flex: 1; min-width: 140px; background: #fff; border-radius: 12px; padding: 12px; border: 1px solid #e5e7eb; }
        .mini .t { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
        .mini .v { font-size: 16px; font-weight: 700; color: #374151; word-break: break-word; }
        .actions-row { display: flex; gap: 10px; margin: 14px 0 10px; }
        .action-btn {
            flex: 1; padding: 12px 8px; border-radius: 999px; border: none; background: #fff;
            box-shadow: 0 2px 8px rgba(15,23,42,.12); font-size: 14px; font-weight: 700; color: #111827;
            text-decoration: none; text-align: center; transition: .12s;
        }
        .action-btn:hover { background: #eff6ff; transform: translateY(-1px); }
        .more { display: block; width: 100%; padding: 12px; margin-top: 6px; border-radius: 999px; border: 1px solid #e5e7eb;
            background: #fff; font-size: 15px; font-weight: 600; text-align: center; text-decoration: none; color: #111827; }
        .dev-footer { margin-top: 14px; font-size: 11px; color: #9ca3af; text-align: center; }
        .more:hover { background: #f9fafb; }
        .nav-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 8px; }
        .nav-item {
            padding: 12px 10px; border-radius: 12px; border: 1px solid #e5e7eb; background: #fafafa;
            text-decoration: none; color: #111827; font-size: 14px; font-weight: 600;
        }
        .nav-item:hover { background: #eef2ff; }
        .nav-desc { font-size: 11px; color: #6b7280; font-weight: 400; margin-top: 4px; line-height: 1.35; }
    </style>
</head>
<body>
<div class="container">
    <div class="greeting">你好，<span th:text="${name}">朋友</span></div>

    <div class="block">
        <h2>当前化疗阶段（参考）</h2>
        <p th:text="${phaseStage}">—</p>
    </div>

    <div class="block">
        <h2>今日饮食 / 营养风险提醒</h2>
        <p th:text="${nutritionRiskHint}">—</p>
    </div>

    <div class="card-row">
        <div class="mini">
            <div class="t">当前周期</div>
            <div class="v" th:text="${currentCycleDisplay}">—</div>
        </div>
        <div class="mini">
            <div class="t">今日用药参考</div>
            <div class="v" th:text="${todayMedicationTip}">—</div>
        </div>
    </div>

    <div class="actions-row">
        <a th:href="@{/supplement-check}" class="action-btn">查风险</a>
        <a th:href="@{/reaction}" class="action-btn">记反应</a>
        <a th:href="@{/daily-plan}" class="action-btn">看方案</a>
    </div>

    <a th:href="@{/interaction}" class="more">营养与药物相互作用报告（红黄绿）</a>

    <a th:href="@{/settings}" class="more" style="margin-top:8px;">我的 / 设置</a>

    <div class="block" style="margin-top:16px;">
        <h2>更多功能</h2>
        <div class="nav-grid">
            <a th:href="@{/patient}" class="nav-item">
                患者信息
                <div class="nav-desc">年龄体重、肝肾功能、过敏与禁忌、营养需求</div>
            </a>
            <a th:href="@{/regimen}" class="nav-item">
                化疗方案
                <div class="nav-desc">选择方案、周期与参考用药</div>
            </a>
        </div>
    </div>
    <p class="dev-footer">开发者标识 · 学号后五位 72203 · Yang SiQing</p>
</div>
</body>
</html>
