<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>快捷主页 · CancerApp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .container {
            max-width: 540px;
            margin: 0 auto;
        }
        .greeting {
            font-size: 20px;
            font-weight: 600;
            margin: 8px 0 16px;
            color: #111827;
        }
        .greeting span {
            color: #2563eb;
        }
        .card-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .card {
            flex: 1;
            background: #fff;
            border-radius: 12px;
            padding: 14px 12px 18px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.1);
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }
        .card-value {
            font-size: 18px;
            font-weight: 700;
            color: #4b5563;
            margin-top: 6px;
            word-break: break-word;
        }
        .actions-row {
            display: flex;
            gap: 10px;
            margin: 12px 0 18px;
        }
        .action-btn {
            flex: 1;
            padding: 10px 8px;
            border-radius: 999px;
            border: none;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12);
            font-size: 14px;
            font-weight: 600;
            color: #111827;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: transform 0.08s, box-shadow 0.12s, background 0.1s;
        }
        .action-btn:hover {
            background: #eff6ff;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(37, 99, 235, 0.25);
        }
        .footer-btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 999px;
            border: 1px solid #e5e7eb;
            background: #ffffff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            color: #111827;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
            transition: background 0.12s, box-shadow 0.12s, transform 0.08s;
        }
        .footer-btn:hover {
            background: #f3f4f6;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="greeting">
            你好，<span th:text="${name}">朋友</span>
        </div>

        <div class="card-row">
            <div class="card">
                <div class="card-title">当前化疗周期</div>
                <div class="card-value" th:text="${currentCycle} == null ? 'null' : ${currentCycle}">null</div>
            </div>
            <div class="card">
                <div class="card-title">今日用药提示</div>
                <div class="card-value" th:text="${todayMedicationTip} == null ? 'null' : ${todayMedicationTip}">null</div>
            </div>
        </div>

        <div class="actions-row">
            <a th:href="@{/supplement-check}" class="action-btn">查风险</a>
            <a th:href="@{/reaction}" class="action-btn">记反应</a>
            <a th:href="@{/daily-plan}" class="action-btn">看方案</a>
        </div>

        <a th:href="@{/home}" class="footer-btn">进入首页</a>
    </div>
</body>
</html>
